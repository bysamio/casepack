services:
  postgres:
    image: ghcr.io/bysamio/postgresql:17.7
    environment:
      POSTGRES_DB: casepack
      POSTGRES_USER: casepack
      POSTGRES_PASSWORD: casepack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../casepack-infra/postgres:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:latest # minio/minio:RELEASE.2024-12-18T02-39-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/casepack || true;
      mc anonymous set none local/casepack || true;
      echo 'MinIO bucket casepack ready';
      "

  keycloak:
    image: ghcr.io/bysamio/keycloak:26.5.2-optimized
    command: start --import-realm --optimized
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: casepack
      KC_DB_PASSWORD: casepack
    ports:
      - "8081:8080"
    volumes:
      - ../casepack-infra/keycloak:/opt/keycloak/data/import
    depends_on:
      - postgres

  api:
    build: ../casepack-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/casepack
      DB_USER: casepack
      DB_PASS: casepack
      OIDC_ISSUER_URI: http://keycloak:8080/realms/casepack
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: casepack
      S3_REGION: us-east-1
      S3_PATH_STYLE: "true"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - keycloak
      - minio
  spa:
    build: ../casepack-spa
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_KEYCLOAK_URL: http://localhost:8081 # Check if this is needed
      VITE_KEYCLOAK_REALM: casepack # Check if this is needed
      VITE_OIDC_CLIENT_ID: casepack-spa
      VITE_OIDC_SCOPE: openid profile email
      VITE_OIDC_AUTHORITY: http://localhost:8081/realms/casepack
      VITE_OIDC_REDIRECT_URI: http://localhost:5173/
    ports:
      - "4173:80"
    depends_on:
      - api
      - keycloak

volumes:
  pgdata:
  miniodata:
