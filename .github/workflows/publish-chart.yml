name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update dependencies
        run: helm dependency update charts/casepack/

      - name: Package chart
        run: helm package charts/casepack/ -d .helm-packages/

      - name: Push to GHCR
        run: helm push .helm-packages/casepack-*.tgz oci://ghcr.io/bysamio/charts
