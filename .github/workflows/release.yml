name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
      app_version:
        description: "App version — casepack-api version (e.g. 0.3.1). Leave empty to keep current."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: ${{ inputs.version }}"
            echo "   Expected: MAJOR.MINOR.PATCH (e.g. 0.2.0)"
            exit 1
          fi
          if git tag -l "v${{ inputs.version }}" | grep -q .; then
            echo "❌ Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ inputs.version }}/" charts/casepack/Chart.yaml
          if [[ -n "${{ inputs.app_version }}" ]]; then
            sed -i "s/^appVersion:.*/appVersion: \"${{ inputs.app_version }}\"/" charts/casepack/Chart.yaml
          fi
          echo "Updated Chart.yaml:"
          grep -E '^(version|appVersion):' charts/casepack/Chart.yaml

      - name: Commit and tag
        run: |
          git add charts/casepack/Chart.yaml
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "CasePack v${{ inputs.version }}" \
            --generate-notes
