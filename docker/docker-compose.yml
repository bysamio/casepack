# CasePack — Self-Host Docker Compose Stack
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up -d
#
# Default URLs:
#   API:      http://localhost:8080
#   Keycloak: http://localhost:8081
#   MinIO:    http://localhost:9001 (console)

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: ghcr.io/bysamio/postgresql:17.7-alpine
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-casepack}
      POSTGRES_USER: ${DB_USER:-casepack}
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
      KC_DB_NAME: ${KC_DB_NAME:-keycloak}
      KC_DB_USER: ${KC_DB_USER:-keycloak}
      KC_DB_PASS: ${KC_DB_PASS:?Set KC_DB_PASS in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-casepack}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────
  keycloak:
    image: ghcr.io/bysamio/keycloak:26.5.2-optimized
    command: start --optimized --import-realm --http-port=8080
    restart: unless-stopped
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASS:?Set KC_DB_PASS in .env}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost:8081}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS:?Set KC_ADMIN_PASS in .env}
    volumes:
      - ./keycloak/casepack-realm.json:/opt/keycloak/data/import/casepack-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && timeout 2 cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  # ── MinIO ───────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CasePack API ───────────────────────────────────────────────
  api:
    image: ghcr.io/bysamio/casepack-api:${CASEPACK_VERSION:-0.3.1}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-casepack}
      DB_USER: ${DB_USER:-casepack}
      DB_PASS: ${DB_PASS:?Set DB_PASS in .env}
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-http://localhost:8081/realms/casepack}
      OIDC_JWK_SET_URI: ${OIDC_JWK_SET_URI:-http://keycloak:8080/realms/casepack/protocol/openid-connect/certs}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-casepack}
      S3_PATH_STYLE: "true"
      S3_AUTO_CREATE_BUCKET: "true"
      CASEPACK_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      CASEPACK_SWAGGER_PUBLIC: "${SWAGGER_PUBLIC:-false}"
      CASEPACK_LICENSE_TOKEN: ${CASEPACK_LICENSE_TOKEN:-}
      CASEPACK_LICENSE_PUBLIC_KEY: ${CASEPACK_LICENSE_PUBLIC_KEY:-}
      JAVA_OPTS: "${JAVA_OPTS:--Xms256m -Xmx512m}"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── CasePack SPA (uncomment when image is published) ───────────
  # spa:
  #   image: ghcr.io/bysamio/casepack-spa:${CASEPACK_SPA_VERSION:-latest}
  #   restart: unless-stopped
  #   ports:
  #     - "${SPA_PORT:-3000}:80"
  #   environment:
  #     VITE_API_URL: ${API_URL:-http://localhost:8080}
  #     VITE_OIDC_AUTHORITY: ${OIDC_AUTHORITY:-http://localhost:8081/realms/casepack}
  #     VITE_OIDC_CLIENT_ID: casepack-spa
  #   depends_on:
  #     api:
  #       condition: service_started

volumes:
  pgdata:
  miniodata:
