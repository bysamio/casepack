# CasePack Umbrella Helm Chart — Default Values
# Deploys the full CasePack stack: API, SPA, PostgreSQL, Keycloak, SeaweedFS
#
# Override per-subchart using the subchart key prefix:
#   casepack-api.config.corsOrigins: "https://casepack.example.com"
#   postgresql.auth.password: "changeme"
#
# For production, disable bundled infra and point to external services:
#   postgresql.enabled: false
#   keycloak.enabled: false
#   seaweedfs.enabled: false

# ─── Global ──────────────────────────────────────────────────────
global:
  # Domain base — used to derive defaults for subcharts
  domain: "casepack.example.com"
  # StorageClass for all PVCs (leave empty to use cluster default)
  storageClass: ""

# ═══════════════════════════════════════════════════════════════
#  CasePack API
# ═══════════════════════════════════════════════════════════════
casepack-api:
  replicaCount: 1

  image:
    repository: ghcr.io/bysamio/casepack-api
    tag: ""
    pullPolicy: IfNotPresent

  config:
    serverPort: "8080"
    forwardHeadersStrategy: "NATIVE"
    oidcIssuerUri: "http://casepack-keycloak:8080/realms/casepack"
    oidcJwkSetUri: ""
    s3Endpoint: "http://casepack-seaweedfs:8333"
    s3Region: "us-east-1"
    s3Bucket: "casepack"
    s3PathStyle: "true"
    s3PresignExpiry: "900"
    s3AutoCreateBucket: "true"
    s3BucketPerTenant: "false"
    evidenceMaxBytes: "104857600"
    evidenceAllowedTypes: ""
    rateLimitEnabled: "true"
    rateLimitInit: "30"
    rateLimitFinalize: "30"
    rateLimitGlobal: "300"
    rateLimitWebhookIntake: "60"
    exportMaxItems: "100"
    exportMaxBytes: "536870912"
    exportPoolSize: "2"
    webhookEnabled: "true"
    webhookMaxPayload: "1048576"
    timelineEnabled: "true"
    corsOrigins: "http://localhost:5173"
    deploymentMode: "self_host"
    installationId: ""
    licenseKeySource: "env"
    javaOpts: "-Xms256m -Xmx512m"

  secrets:
    existingSecret: ""
    dbUrl: "jdbc:postgresql://casepack-postgresql:5432/casepack"
    dbUser: "casepack"
    dbPass: "casepack"                 # Override in production!
    s3AccessKey: ""
    s3SecretKey: ""
    licenseTokenFile: ""

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: api.casepack.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 768Mi

# ═══════════════════════════════════════════════════════════════
#  CasePack SPA
# ═══════════════════════════════════════════════════════════════
casepack-spa:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/bysamio/casepack-spa
    tag: ""
    pullPolicy: IfNotPresent
  config:
    apiBaseUrl: "http://casepack-casepack-api:80"
    oidcAuthority: "http://casepack-keycloak:8080/realms/casepack"
    oidcClientId: "casepack-spa"
  ingress:
    enabled: false
    className: nginx
    hosts:
      - host: casepack.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ═══════════════════════════════════════════════════════════════
#  PostgreSQL (BySamio)
# ═══════════════════════════════════════════════════════════════
postgresql:
  enabled: true
  auth:
    database: casepack
    username: casepack
    password: casepack             # Override in production!
    postgresPassword: postgres     # Override in production!
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ═══════════════════════════════════════════════════════════════
#  Keycloak (BySamio chart)
# ═══════════════════════════════════════════════════════════════
keycloak:
  enabled: true
  image:
    tag: 26.5.2
  production: false
  httpEnabled: true
  auth:
    adminUser: admin
    adminPassword: admin           # Override in production!
  database:
    vendor: postgres
    host: casepack-postgresql
    port: 5432
    database: keycloak
    user: keycloak
    password: keycloak             # Override in production!
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1024Mi
  ingress:
    enabled: false
    className: nginx
    hosts:
      - host: auth.casepack.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ═══════════════════════════════════════════════════════════════
#  SeaweedFS (S3-compatible storage)
# ═══════════════════════════════════════════════════════════════
seaweedfs:
  enabled: true
  image:
    repository: chrislusf/seaweedfs
    tag: latest
  s3:
    enabled: true
    port: 8333
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
